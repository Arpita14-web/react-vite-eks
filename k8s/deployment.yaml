apiVersion: apps/v1
kind: Deployment

metadata:
  name: react-vite-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: react-vite

  template:
    metadata:
      labels:
        app: react-vite

    spec:
      containers:
      - name: react-vite-container
        image: 317018178943.dkr.ecr.ap-south-1.amazonaws.com/react-vite-app:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 80
